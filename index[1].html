  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }

    #splash {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    /* Circuit lines background */
    #splash::before {
      content: '';
      position: absolute;
      inset: 0;
      background: none;
    }

    @keyframes gridFade {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .icon-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 28px;
      animation: iconPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes iconPop {
      0% { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .icon-glow {
      position: absolute;
      inset: -15px;
      border-radius: 40px;
      background: radial-gradient(circle, rgba(26,58,143,0.15) 0%, transparent 70%);
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .icon-img {
      width: 130px;
      height: 130px;
      border-radius: 0;
      box-shadow: 0 8px 32px rgba(26,58,143,0.25);
      position: relative;
      z-index: 1;
    }

    .app-name {
      color: #1a3a8f;
      font-size: 32px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: none;
      animation: textFade 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    .app-sub {
      color: #4a6fa5;
      font-size: 13px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 6px;
      animation: textFade 0.8s ease 0.6s forwards;
      opacity: 0;
    }

    @keyframes textFade {
      0% { transform: translateY(10px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .loader-wrap {
      margin-top: 50px;
      animation: textFade 0.8s ease 0.8s forwards;
      opacity: 0;
    }

    .loader-track {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd);
      border-radius: 3px;
      animation: loadBar 2s ease forwards;
      box-shadow: 0 0 10px rgba(96,165,250,0.8);
    }

    @keyframes loadBar {
      0% { width: 0%; }
      40% { width: 60%; }
      100% { width: 100%; }
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: rgba(96,165,250,0.6);
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
